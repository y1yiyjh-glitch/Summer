  --primary: #5b5bd6;

  --green: #2f9e76;

}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {

  color: var(--ink);
  background:

button, input, textarea, select { font: inherit; }

button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {

}

.skip-link {

}
.skip-link:focus { top: 1rem; }

.topbar {

  display: flex; justify-content: space-between; align-items: center;
  min-height: 74px; padding: .75rem clamp(1rem, 4vw, 3rem);
  background: rgba(255,255,255,.88); backdrop-filter: blur(14px);

}
.brand-button {

.brand-button strong { display: block; font-size: 1.05rem; }
.brand-button small { display: block; color: var(--muted); font-size: .76rem; }

.save-status { color: var(--green); font-size: .85rem; font-weight: 700; }

.section-card { padding: 1.35rem; }
.stack { display: grid; gap: 1rem; }
.stack-lg { display: grid; gap: 1.5rem; }
.grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1rem; }

.page-title { font-size: clamp(1.8rem, 4vw, 3rem); }

.activity-card h3 { margin: .55rem 0 .35rem; }
.activity-card p { margin: 0 0 1rem; color: var(--muted); min-height: 3.2em; }
.status-chip { position: absolute; right: 1rem; top: 1rem; padding: .25rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 800; background: #eeeefe; color: var(--primary); }
.status-chip.done { background: #e4f6ef; color: #237657; }

.primary-button, .secondary-button, .ghost-button, .danger-button {

.primary-button { background: var(--primary); color: white; }

.secondary-button { background: var(--surface-2); color: var(--primary-dark); border-color: #d6d7f6; }
.ghost-button { background: white; color: var(--ink); border-color: var(--line); }
.danger-button { background: #fff0f2; color: var(--red); border-color: #ffd4db; }
.button-row { display: flex; flex-wrap: wrap; gap: .7rem; margin-top: 1.2rem; }
.button-row.end { justify-content: flex-end; }

.field { display: grid; gap: .45rem; }
.field label, .field legend { font-weight: 800; }
.field small, .helper { color: var(--muted); }

textarea { resize: vertical; min-height: 105px; }
fieldset { border: 0; padding: 0; margin: 0; }

.choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .65rem; }
.choice input { position: absolute; opacity: 0; pointer-events: none; }

.report { background: white; border-radius: 26px; border: 1px solid var(--line); overflow: hidden; box-shadow: var(--shadow); }
.report-cover { padding: 2.5rem; text-align: center; background: linear-gradient(135deg,#5b5bd6,#8468dd); color: white; }
.report-cover h1 { margin: .4rem 0; font-size: clamp(2rem,5vw,3.7rem); }
.report-body { padding: clamp(1.2rem, 4vw, 2.7rem); }
.report-section { padding: 1.2rem 0; border-bottom: 1px solid var(--line); }

.report-section h2 { margin: 0 0 .8rem; }
.future-poster { display: grid; grid-template-columns: .7fr 1.3fr; gap: 1rem; padding: 1.2rem; border-radius: 18px; background: #f7f7ff; }
.future-emoji { display: grid; place-items: center; min-height: 180px; border-radius: 18px; background: linear-gradient(145deg,#fff3d2,#ffd984); font-size: 5rem; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 650px; }
th, td { padding: .75rem; border-bottom: 1px solid var(--line); text-align: left; }
th { background: #f5f5ff; }

.toast { position: fixed; left: 50%; bottom: 1.5rem; z-index: 100; transform: translate(-50%, 120px); background: #25253a; color: white; padding: .8rem 1.1rem; border-radius: 13px; box-shadow: var(--shadow); transition: transform .25s; }
.toast.show { transform: translate(-50%,0); }
.modal-backdrop { position: fixed; inset: 0; z-index: 90; display: grid; place-items: center; padding: 1rem; background: rgba(25,25,45,.48); }
.modal { width: min(560px,100%); max-height: 90vh; overflow: auto; background: white; border-radius: 22px; padding: 1.4rem; box-shadow: 0 30px 80px rgba(0,0,0,.25); }
.modal h2 { margin-top: 0; }

@media (max-width: 820px) {
  .hero, .grid-2, .grid-3, .grid-4, .future-poster { grid-template-columns: 1fr; }
  .hero-visual { min-height: 240px; }
  .page-head { align-items: flex-start; flex-direction: column; }
  .save-status { display: none; }
  .progress-labels { font-size: .66rem; }
}
@media (max-width: 560px) {
  #app { width: min(100% - 1rem,1180px); }
  .topbar { padding: .6rem .7rem; }
  .brand-button small { display: none; }
  .ghost-button { padding-inline: .7rem; }
  .hero { padding: 1.25rem; border-radius: 22px; }
  .planet { width: 200px; font-size: 4.5rem; }
  .choice-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .button-row > button { flex: 1 1 auto; }
}

@media print {
  body { background: #fff; }
  .topbar, .footer, .no-print, .button-row, .toast { display: none !important; }
  #app { width: 100%; padding: 0; }
  .report { box-shadow: none; border: 0; }
  .report-cover { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .report-section { break-inside: avoid; }
}

</style>

function blankProfile(nickname = '', id = '') {
  return {
    id,
    nickname, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    completed: {interest:false, strength:false, ai:false, future:false, report:false},
    interest: {selected:[], custom:'', fastTime:'', keepTrying:'', schoolFun:'', newLearn:'', mode:'', reasons:[], otherReason:'', top:[]},
    strength: {cards:[], own:[], top:[], discovery:'', useAt:'', grow:'', thanks:''},
    ai: {extra:'', values:[], recommendations:[], reactions:{}, expected:'', newJob:'', favorite:'', favoriteWhy:'', agree:'', mismatch:'', chosenActivity:''},
    future: {topic:'', customTopic:'', change:'', problem:'', target:'', help:'', name:'', tasks:['','',''], tools:[], strengths:[], place:'', benefit:'', emoji:'✨', intro:'', published:false},
    finalThoughts: {like:'', strength:'', job:'', reason:'', next:''}
  };
}

function mergeProfile(base, incoming={}) {
  const cardsSource = incoming?.strength?.cards;
  const cards = Array.isArray(cardsSource) ? cardsSource : (cardsSource && typeof cardsSource === 'object' ? Object.values(cardsSource) : []);
  return {
    ...base,
    ...incoming,
    id: base.id,
    nickname: base.nickname,
    completed: {...base.completed, ...(incoming.completed||{})},
    interest: {...base.interest, ...(incoming.interest||{})},
    strength: {...base.strength, ...(incoming.strength||{}), cards},
    ai: {...base.ai, ...(incoming.ai||{}), reactions:{...base.ai.reactions, ...(incoming?.ai?.reactions||{})}},
    future: {...base.future, ...(incoming.future||{})},
    finalThoughts: {...base.finalThoughts, ...(incoming.finalThoughts||{})}
  };
}

function ensureClassProfiles(data={}) {
  const sourceProfiles = data.profiles && typeof data.profiles === 'object' ? Object.values(data.profiles) : [];
  const profiles = {};
  for (const student of STUDENTS) {
    const existing = data.profiles?.[student.id] || sourceProfiles.find(p => p && p.nickname === student.nickname) || {};
    profiles[student.id] = mergeProfile(blankProfile(student.nickname, student.id), existing);
  }
  const validIds = new Set(STUDENTS.map(student => student.id));
  const rawGallery = Array.isArray(data.gallery) ? data.gallery : (data.gallery && typeof data.gallery === 'object' ? Object.values(data.gallery) : []);
  return {
    currentId: validIds.has(data.currentId) ? data.currentId : null,
    profiles,
    gallery: rawGallery.filter(item => item && validIds.has(item.profileId))
  };
}

function loadStore() {
  try {
    const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (parsed && parsed.profiles) return ensureClassProfiles(parsed);
  } catch (error) { console.warn('저장 자료 읽기 실패', error); }
  return ensureClassProfiles({currentId:null, profiles:{}, gallery:[]});
}

function escapeHTML(value='') { return String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c])); }
function nowText() { return new Intl.DateTimeFormat('ko-KR',{hour:'2-digit',minute:'2-digit'}).format(new Date()); }

}

function remoteCardMap(cards=[]) {
  return Object.fromEntries(cards.map(card => {
    const writer = STUDENTS.find(student => student.nickname === card.friend);
    return [writer?.id || card.friend, card];
  }));
}

function remoteProfilePayload(p) {
  return {...p, strength:{...p.strength, cards:remoteCardMap(p.strength.cards)}};
}

async function syncSection(section='profile', extra={}) {
  if (!firebaseReady || applyingRemote) return;
  const p = profile();
  if (!p && !['full','clear'].includes(section)) return;
  const base = `${FIREBASE_ROOT}/profiles/${p?.id || ''}`;
  try {
    if (section === 'interest') {
      await update(ref(database, base), {interest:p.interest, 'completed/interest':p.completed.interest, updatedAt:p.updatedAt});
    } else if (section === 'friendCard') {
      const writer = STUDENTS.find(student => student.nickname === extra.friend);
      await set(ref(database, `${base}/strength/cards/${writer?.id || extra.friend}`), extra.card);
      await update(ref(database, base), {'strength/top':[], 'completed/strength':false, updatedAt:p.updatedAt});
    } else if (section === 'deleteFriendCard') {
      const writer = STUDENTS.find(student => student.nickname === extra.friend);
      await remove(ref(database, `${base}/strength/cards/${writer?.id || extra.friend}`));
      await update(ref(database, base), {'strength/top':[], 'completed/strength':false, updatedAt:p.updatedAt});
    } else if (section === 'strength') {
      await update(ref(database, base), {
        'strength/own':p.strength.own,
        'strength/top':p.strength.top,
        'strength/discovery':p.strength.discovery,
        'strength/useAt':p.strength.useAt,
        'strength/grow':p.strength.grow,
        'strength/thanks':p.strength.thanks || '',
        'completed/strength':p.completed.strength,
        updatedAt:p.updatedAt
      });
    } else if (section === 'ai') {
      await update(ref(database, base), {ai:p.ai, 'completed/ai':p.completed.ai, updatedAt:p.updatedAt});
    } else if (section === 'future') {
      await update(ref(database, base), {future:p.future, 'completed/future':p.completed.future, updatedAt:p.updatedAt});
      const galleryItem = store.gallery.find(item => item.profileId === p.id);
      if (galleryItem) await set(ref(database, `${FIREBASE_ROOT}/gallery/${p.id}`), galleryItem);
      else await remove(ref(database, `${FIREBASE_ROOT}/gallery/${p.id}`));
    } else if (section === 'report') {
      await update(ref(database, base), {finalThoughts:p.finalThoughts, 'completed/report':p.completed.report, updatedAt:p.updatedAt});
    } else if (section === 'resetProfile') {
      await set(ref(database, base), remoteProfilePayload(p));
      await remove(ref(database, `${FIREBASE_ROOT}/gallery/${p.id}`));
    } else if (section === 'full') {
      const payloadProfiles = Object.fromEntries(Object.entries(store.profiles).map(([id,item]) => [id, remoteProfilePayload(item)]));
      const payloadGallery = Object.fromEntries(store.gallery.map(item => [item.profileId, item]));
      await set(ref(database, FIREBASE_ROOT), {profiles:payloadProfiles, gallery:payloadGallery, updatedAt:new Date().toISOString()});
    }
    saveStatus.textContent = `Firebase 저장 완료 · ${nowText()}`;
  } catch (error) {
    console.error('Firebase 저장 실패', error);
    saveStatus.textContent = 'Firebase 저장 실패 · 기기에는 저장됨';
  }
}

function saveStore(message='자동 저장됨', section='profile', extra={}) {
  if (profile()) profile().updatedAt = new Date().toISOString();
  localSave(message);
  if (section !== 'local') syncSection(section, extra);
}

async function initializeFirebaseSync() {
  saveStatus.textContent = 'Firebase 연결 중…';
  try {
    const rootRef = ref(database, FIREBASE_ROOT);
    const snapshot = await get(rootRef);
    const remote = snapshot.val();
    firebaseReady = true;
    if (remote?.profiles) {
      const currentId = store.currentId;
      applyingRemote = true;
      store = ensureClassProfiles({...remote, currentId});
      applyingRemote = false;
      localSave('Firebase 자료 불러옴');
      render();
    } else {
      await syncSection('full');
    }
    onValue(rootRef, snap => {
      const value = snap.val();
      if (!value?.profiles) return;
      const currentId = store.currentId;
      applyingRemote = true;
      store = ensureClassProfiles({...value, currentId});
      applyingRemote = false;
      localSave('Firebase 동기화됨');
      if (['welcome','dashboard','teacher','gallery'].includes(currentView)) render();
    }, error => {
      console.error('Firebase 실시간 읽기 실패', error);
      saveStatus.textContent = 'Firebase 읽기 실패 · 기기 저장 사용 중';
    });
  } catch (error) {
    console.error('Firebase 연결 실패', error);
    firebaseReady = false;
    saveStatus.textContent = 'Firebase 연결 실패 · 기기 저장 사용 중';
  }
}

function scoreCareer(c,p) {
  const inputs=[...p.interest.selected,...p.interest.top,...p.strength.top,...p.strength.own];
  let score=0;
  for(const tag of c.tags) for(const input of inputs) if(input.includes(tag)||tag.includes(input)) score+=3;
  for(const value of p.ai.values) if(c.values.includes(value)) score+=4;
  const textPool=[p.interest.fastTime,p.interest.keepTrying,p.interest.schoolFun,p.interest.newLearn,p.ai.extra].join(' ');
  for(const tag of c.tags) if(textPool.includes(tag.replace(/하기$/,''))) score+=1;
  return score + Math.random()*.3;
}

function generateRecommendations(p) {
  const ranked=careers.map(c=>({...c,score:scoreCareer(c,p)})).sort((a,b)=>b.score-a.score);
  const chosen=[]; const types=['친숙한 직업','잘 알려지지 않은 직업','미래 중요 직업'];
  types.forEach(type=>{const candidate=ranked.find(c=>c.type===type&&!chosen.some(x=>x.name===c.name)); if(candidate)chosen.push(candidate);});
  for(const c of ranked) {
    if(chosen.length>=5)break;
    const categoryCount=chosen.filter(x=>x.category===c.category).length;
    if(!chosen.some(x=>x.name===c.name)&&categoryCount<2) chosen.push(c);
  }
  return chosen.slice(0,5).map(({score,...c})=>c);
}

function bindEvents() {
  document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>setView(el.dataset.view)));
  document.querySelectorAll('[data-load-profile]').forEach(el=>el.addEventListener('click',()=>{store.currentId=el.dataset.loadProfile;saveStore('탐험 불러옴','local');setView('dashboard');}));
  document.getElementById('switchProfile')?.addEventListener('click',()=>{store.currentId=null;saveStore('학생 전환','local');setView('welcome');});
  document.getElementById('interestForm')?.addEventListener('submit',saveInterest);
  document.getElementById('friendCardForm')?.addEventListener('submit',saveFriendCard);
  document.querySelectorAll('[data-delete-card]').forEach(el=>el.addEventListener('click',()=>{const card=profile().strength.cards[Number(el.dataset.deleteCard)];profile().strength.cards.splice(Number(el.dataset.deleteCard),1);profile().strength.top=[];profile().completed.strength=false;saveStore('강점 카드 삭제됨','deleteFriendCard',{friend:card?.friend||''});renderStrength();}));
  document.getElementById('strengthResultForm')?.addEventListener('submit',saveStrengthResult);
  document.getElementById('aiInputForm')?.addEventListener('submit',runAI);
  document.getElementById('aiReflectionForm')?.addEventListener('submit',saveAIReflection);
  document.querySelectorAll('[data-reaction]').forEach(el=>{if(el.tagName==='SELECT')el.addEventListener('change',()=>{profile().ai.reactions[el.dataset.reaction]=el.value;saveStore('관심 표시 저장됨','ai');});});
  document.getElementById('futureHintBtn')?.addEventListener('click',showFutureHint);
  document.querySelectorAll('.hint-name').forEach(el=>el.addEventListener('click',()=>{document.getElementById('futureName').value=el.dataset.hintName;}));
  document.getElementById('futureForm')?.addEventListener('submit',saveFuture);
  document.getElementById('finalThoughtForm')?.addEventListener('submit',saveFinalThoughts);
  document.getElementById('printReport')?.addEventListener('click',()=>window.print());
  document.getElementById('downloadReport')?.addEventListener('click',()=>downloadJSON(profile(),`${profile().nickname}-꿈끼탐험보고서.json`));
  document.querySelectorAll('.gallery-react').forEach(el=>el.addEventListener('click',async()=>{const item=store.gallery[Number(el.dataset.index)];item.reactions=(item.reactions||0)+1;localSave('반응 저장됨');if(firebaseReady){try{await runTransaction(ref(database,`${FIREBASE_ROOT}/gallery/${item.profileId}/reactions`),value=>(value||0)+1);}catch(error){console.error('반응 저장 실패',error);}}toast(el.dataset.reaction);renderGallery();}));
  document.querySelectorAll('[data-teacher-open]').forEach(el=>el.addEventListener('click',()=>{store.currentId=el.dataset.teacherOpen;saveStore('학생 자료 열기','local');setView('dashboard');}));
  document.querySelectorAll('[data-reset-profile]').forEach(el=>el.addEventListener('click',()=>{if(confirm('이 학생의 모든 활동 내용을 초기화할까요?')){const id=el.dataset.resetProfile;const old=store.profiles[id];store.profiles[id]=blankProfile(old.nickname,id);store.gallery=store.gallery.filter(item=>item.profileId!==id);const previousCurrent=store.currentId;store.currentId=id;saveStore('학생 자료 초기화됨','resetProfile');store.currentId=previousCurrent===id?null:previousCurrent;localSave('초기화됨');renderTeacher();}}));
  document.getElementById('exportAll')?.addEventListener('click',()=>downloadJSON(store,'꿈끼탐험대-전체자료.json'));
  document.getElementById('clearAll')?.addEventListener('click',async()=>{if(confirm('Firebase와 이 기기에 저장된 학급 전체 활동 자료를 초기화할까요? 되돌릴 수 없습니다.')){store=ensureClassProfiles({currentId:null,profiles:{},gallery:[]});localSave('전체 초기화됨');if(firebaseReady)await syncSection('full');currentView='welcome';render();}});
}

function saveInterest(e) {
  e.preventDefault(); const p=profile(), selectedActivities=collect('activities'), custom=text('customActivity'), top=collect('topInterests');
  if(selectedActivities.length+(custom?1:0)<3) return toast('좋아하는 활동을 3개 이상 골라 주세요.');
  if(top.length!==3) return toast('대표 흥미 보물을 정확히 3개 골라 주세요.');
  Object.assign(p.interest,{selected:selectedActivities,custom,fastTime:text('fastTime'),keepTrying:text('keepTrying'),schoolFun:text('schoolFun'),newLearn:text('newLearn'),mode:collect('mode')[0]||'',reasons:collect('reasons'),otherReason:text('otherReason'),top});
  p.completed.interest=true; saveStore('흥미 저장됨','interest'); toast('흥미 보물 3개를 저장했어요!'); setView('dashboard');
}

function saveFriendCard(e) {
  e.preventDefault();
  const p=profile(), friend=selected('friendName'), strengths=collect('friendStrengths'), reason=text('friendReason');
  if(!friend)return toast('강점 카드를 작성한 친구의 이름을 골라 주세요.');
  if(strengths.length<3||strengths.length>5)return toast('강점을 3개에서 5개 사이로 골라 주세요.');
  const card={friend,strengths,reason,createdAt:new Date().toISOString()};
  const existingIndex=p.strength.cards.findIndex(c=>c.friend===friend);
  if(existingIndex>=0)p.strength.cards[existingIndex]=card; else p.strength.cards.push(card);
  p.strength.top=[];
  p.completed.strength=false;
  saveStore('강점 카드 저장됨','friendCard',{friend,card}); toast(existingIndex>=0?'강점 카드를 새 내용으로 바꿨어요!':'강점 카드를 보냈어요!'); renderStrength();
}
function saveStrengthResult(e) {
  e.preventDefault(); const p=profile(), top=collect('topStrengths');
  if(p.strength.cards.length===0)return toast('친구 강점 카드를 먼저 받아 주세요.');
  if(top.length!==3)return toast('대표 강점을 정확히 3개 골라 주세요.');
  Object.assign(p.strength,{own:collect('ownStrengths'),top,discovery:text('discovery'),useAt:text('useAt'),grow:text('grow')}); p.completed.strength=true; saveStore('강점 저장됨','strength'); toast('강점 보석을 저장했어요!'); setView('ai');
}
function runAI(e) {
  e.preventDefault(); const p=profile(), values=collect('values'); if(values.length<1||values.length>3)return toast('중요하게 생각하는 것을 1~3개 골라 주세요.');
  p.ai.values=values;p.ai.extra=text('aiExtra');
  const btn=e.submitter; if(btn){btn.disabled=true;btn.textContent='직업을 찾고 있어요…';}
  setTimeout(()=>{p.ai.recommendations=generateRecommendations(p);p.completed.ai=false;saveStore('추천 생성됨','ai');toast('직업 추천이 완성되었어요!');renderAI();window.scrollTo({top:document.getElementById('aiResults')?.offsetTop||0,behavior:'smooth'});},650);
}
function saveAIReflection(e) {
  e.preventDefault(); const p=profile(); const favorite=selected('favorite'); if(!favorite)return toast('가장 관심 있는 직업을 골라 주세요.');
  Object.assign(p.ai,{expected:text('expected'),newJob:text('newJob'),favorite,favoriteWhy:text('favoriteWhy'),agree:selected('agree'),mismatch:text('mismatch'),chosenActivity:text('chosenActivity')}); p.completed.ai=true; saveStore('AI 탐험 저장됨','ai');toast('직업 탐험 결과를 저장했어요!');setView('future');
}
function showFutureHint() {
  const topic=collect('futureTopic')[0]; if(!topic||!futureHints[topic])return toast('먼저 미래 주제를 하나 골라 주세요.');
  const hint=futureHints[topic];document.getElementById('futureHintBox').innerHTML=renderFutureHint(hint);document.querySelectorAll('.hint-name').forEach(el=>el.addEventListener('click',()=>{document.getElementById('futureName').value=el.dataset.hintName;}));
  if(!document.getElementById('futureEmoji').value)document.getElementById('futureEmoji').value=hint.emoji; toast('아이디어 씨앗을 준비했어요.');

function saveFuture(e) {
  e.preventDefault(); const p=profile(), topic=collect('futureTopic')[0]||'', customTopic=text('customTopic'); if(!topic&&!customTopic)return toast('미래 주제를 골라 주세요.');
  const name=text('futureName'); if(!name)return toast('미래 직업 이름을 지어 주세요.');
  const tasks=[text('futureTask0'),text('futureTask1'),text('futureTask2')]; if(tasks.filter(Boolean).length<2)return toast('주요 업무를 2가지 이상 적어 주세요.');
  Object.assign(p.future,{topic,customTopic,change:text('futureChange'),problem:text('futureProblem'),target:collect('futureTarget')[0]||'',help:text('futureHelp'),name,tasks,tools:collect('futureTools'),strengths:collect('futureStrengths'),place:collect('workPlace')[0]||'',benefit:text('futureBenefit'),emoji:selected('futureEmoji'),intro:text('futureIntro'),published:document.getElementById('publishFuture').checked});
  p.completed.future=true;
  store.gallery=store.gallery.filter(x=>x.profileId!==p.id);
  if(p.future.published) store.gallery.push({profileId:p.id,nickname:p.nickname,name:p.future.name,emoji:p.future.emoji,problem:p.future.problem,strengths:p.future.strengths,reactions:0});
  saveStore('미래 직업 저장됨','future');toast('미래 직업 카드를 저장했어요!');setView('report');
}
function saveFinalThoughts(e) {
  e.preventDefault(); const p=profile();p.finalThoughts={like:text('finalLike'),strength:text('finalStrength'),job:text('finalJob'),reason:text('finalReason'),next:text('finalNext')};p.completed.report=true;saveStore('보고서 저장됨','report');toast('꿈끼 탐험 보고서가 완성되었어요!');renderReport();
}
function downloadJSON(data,filename) {
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
