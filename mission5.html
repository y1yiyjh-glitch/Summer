<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미션 5. 부모님 도와드리기 (5회)</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBEDF0;             /* 은은한 분홍 배경 */
    --main:#D95F76;           /* 장미 분홍 */
    --main-dark:#B03A52;
    --paper:#FFFEFA;
    --line:#F3D5DC;
    --ink:#2B2B2B;
    --navy:#1B4B8F;
    --title-red:#E8493A;
    --pending:#F59E0B;
    --hold:#E8493A;
    --pass:#2E9E5B;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Gowun Dodum',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 14px 60px;}

  /* ── 헤더 ── */
  .hero{text-align:center;padding:18px 0 6px;}
  .hero .icon{font-size:34px;margin-bottom:4px;}
  .hero .mission-no{
    display:inline-block;background:var(--main);color:#fff;
    font-family:'Jua',sans-serif;font-size:13px;
    padding:5px 14px;border-radius:999px;margin-bottom:10px;
  }
  .hero h1{
    font-family:'Jua',sans-serif;
    font-size:clamp(24px,6.5vw,32px);
    color:var(--main-dark);
    line-height:1.35;
    word-break:keep-all;
  }
  .hero .back-link{margin-top:10px;}
  .hero .back-link a{font-size:13px;color:var(--navy);}

  /* ── 카드 공통 ── */
  .card{
    background:var(--paper);
    border-radius:18px;
    padding:20px 18px;
    margin-top:16px;
    box-shadow:0 4px 14px rgba(176,58,82,.12);
  }
  .card h2{
    font-family:'Jua',sans-serif;color:var(--main-dark);
    font-size:17px;margin-bottom:12px;
  }

  /* ── 과제 설명 ── */
  .howto{list-style:none;}
  .howto li{
    position:relative;padding:8px 0 8px 34px;
    font-size:14px;line-height:1.65;word-break:keep-all;
    border-bottom:1px dashed var(--line);
  }
  .howto li:last-child{border-bottom:none;}
  .howto li .step{
    position:absolute;left:0;top:9px;
    width:24px;height:24px;border-radius:50%;
    background:var(--main);color:#fff;
    font-family:'Jua',sans-serif;font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .tip{
    margin-top:12px;background:#FBF0F2;border-radius:12px;
    padding:11px 14px;font-size:12.5px;line-height:1.7;color:#9A4A5D;
    word-break:keep-all;
  }

  /* ── 하트 도장판 ── */
  .stamp-board{
    display:flex;justify-content:center;gap:12px;
    padding:14px 0 6px;
  }
  .heart{
    width:52px;height:52px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    background:#F7E4E9;border:2.5px dashed var(--line);
    filter:grayscale(1);opacity:.45;
    transition:all .25s;
  }
  .heart.filled{
    background:#FDE8ED;border:2.5px solid var(--main);
    filter:none;opacity:1;
    transform:scale(1.06);
    box-shadow:0 3px 8px rgba(217,95,118,.3);
  }
  .stamp-label{
    text-align:center;font-family:'Jua',sans-serif;
    color:var(--main-dark);font-size:15px;margin-bottom:4px;
  }
  .stamp-label b{color:var(--title-red);font-size:20px;}

  /* ── 로그인 ── */
  .login-box{text-align:center;}
  .login-box input{
    width:100%;font-family:inherit;font-size:17px;
    padding:12px 16px;border:2px solid var(--line);border-radius:12px;
    outline:none;text-align:center;
  }
  .login-box input:focus{border-color:var(--main);}
  .btn{
    font-family:'Jua',sans-serif;font-size:16px;
    border:none;border-radius:12px;padding:13px 20px;
    cursor:pointer;transition:transform .1s;
  }
  .btn:active{transform:scale(.97);}
  .btn-main{background:var(--main);color:#fff;}
  .btn-green{background:var(--pass);color:#fff;}
  .btn-red{background:var(--title-red);color:#fff;}
  .btn-navy{background:var(--navy);color:#fff;}
  .btn-outline{background:#fff;color:var(--main-dark);border:2px dashed var(--main);}
  .btn-ghost{background:none;color:var(--navy);font-size:13px;text-decoration:underline;padding:8px;}
  .btn-block{width:100%;margin-top:12px;}
  .btn:disabled{opacity:.55;cursor:default;}

  /* ── 상단바 ── */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--paper);border-radius:14px;
    padding:10px 16px;margin-top:16px;
    box-shadow:0 3px 10px rgba(176,58,82,.1);
  }
  .topbar .who{font-family:'Jua',sans-serif;color:var(--main-dark);font-size:16px;}
  .mini-btn{
    font-family:inherit;font-size:12.5px;
    border:1.5px solid var(--line);background:#FBF0F2;
    border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--main-dark);
  }

  /* ── 상태 배너 ── */
  .status-banner{
    margin-top:14px;border-radius:14px;padding:13px 16px;
    font-size:14px;line-height:1.6;word-break:keep-all;
  }
  .status-banner.none{background:#FBF0F2;color:#9A4A5D;}
  .status-banner.pending{background:#FFF4DE;color:#9A6B0B;}
  .status-banner.hold{background:#FDEBEA;color:#B33227;}
  .status-banner.passed{background:#E9F7EF;color:#1F7A43;}

  /* ── 기록 목록 ── */
  .record-item{
    display:flex;gap:10px;align-items:flex-start;
    border:1.5px solid var(--line);border-radius:14px;
    padding:12px;margin-bottom:10px;background:#fff;
  }
  .record-item .r-num{
    flex-shrink:0;width:30px;height:30px;border-radius:50%;

    font-family:'Jua',sans-serif;font-size:14px;

  .record-item .r-photo{

  }
  .record-item .r-del{
    flex-shrink:0;border:none;background:none;color:#C08A97;
    font-size:16px;cursor:pointer;padding:2px 4px;
  }

  /* ── 기록 추가 폼 ── */
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-family:'Jua',sans-serif;
    font-size:14px;color:var(--main-dark);margin-bottom:6px;
  }
  .field label .opt{font-size:11.5px;color:#C08A97;font-family:'Gowun Dodum',sans-serif;}
  .field input[type=text], .field input[type=date]{
    width:100%;font-family:inherit;font-size:15px;
    padding:11px 13px;border:2px solid var(--line);border-radius:12px;
    outline:none;background:#fff;
  }
  .field input:focus{border-color:var(--main);}
  .photo-slot{
    display:flex;align-items:center;gap:10px;
  }
  .photo-slot .thumb{
    width:64px;height:64px;border-radius:12px;object-fit:cover;
    border:2px solid var(--line);cursor:pointer;
  }
  .photo-slot .add{
    width:64px;height:64px;border-radius:12px;
    border:2px dashed var(--main);background:#FBF0F2;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;color:var(--main-dark);font-size:10.5px;gap:2px;
    font-family:'Jua',sans-serif;
  }
  .photo-slot .add span:first-child{font-size:20px;}
  .photo-slot .remove{
    border:none;background:none;color:#C08A97;font-size:13px;
    cursor:pointer;text-decoration:underline;
  }

  /* ── 교사 화면 ── */
  .post-item{
    border:1.5px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:12px;background:#fff;
  }
  .post-item .p-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .post-item .p-name{font-family:'Jua',sans-serif;color:var(--main-dark);font-size:15px;}
  .p-badge{
    font-family:'Jua',sans-serif;font-size:11px;color:#fff;
    padding:3px 10px;border-radius:999px;
  }
  .p-badge.pending{background:var(--pending);}
  .p-badge.hold{background:var(--hold);}
  .p-badge.passed{background:var(--pass);}
  .p-badge.progress{background:#9CA3AF;}
  .post-item .p-meta{font-size:12px;color:#C08A97;margin-bottom:8px;}
  .post-item .p-btns{display:flex;gap:8px;}
  .post-item .p-btns .btn{flex:1;font-size:14px;padding:9px 14px;}
  .empty-msg{font-size:14px;color:#C08A97;text-align:center;padding:16px 0;}

  /* ── 사진 크게 보기 ── */
  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,.8);
    display:flex;align-items:center;justify-content:center;
    z-index:100;cursor:pointer;padding:16px;
  }
  .lightbox img{max-width:100%;max-height:90vh;border-radius:12px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--main-dark);color:#fff;padding:11px 22px;border-radius:999px;
    font-size:14px;z-index:200;box-shadow:0 4px 14px rgba(0,0,0,.25);
    animation:pop .2s;
  }
  @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .loading{text-align:center;padding:40px 0;font-family:'Jua',sans-serif;color:var(--main-dark);}
  .setup-code{
    background:#3D2229;color:#F2D6DD;border-radius:12px;
    padding:14px;font-family:monospace;font-size:12px;
    line-height:1.7;overflow-x:auto;margin:10px 0;white-space:pre;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   ★ 설정 구역 — 선생님이 이 부분만 수정하면 됩니다 ★
   ═══════════════════════════════════════════════════════
   빙고판(index.html)에 붙여 넣은 것과 똑같은
   firebaseConfig 값을 아래에 붙여 넣으세요.
*/
const firebaseConfig = {
  apiKey: "AIzaSyCBgz3oLm_dgKBFwGglidasKoENI5PNs7I",
  authDomain: "summer-vacation-mission.firebaseapp.com",
  databaseURL: "https://summer-vacation-mission-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "summer-vacation-mission",
  storageBucket: "summer-vacation-mission.firebasestorage.app",
  messagingSenderId: "171875205794",
  appId: "1:171875205794:web:a5cca666fedc22c2b5cdfb",
  measurementId: "G-H9QZ9NXR39"
};
const TEACHER_PIN = "2026";      // 선생님 비밀번호 (빙고판과 동일하게)
const MISSION_INDEX = 4;         // 이 과제의 빙고판 번호 (미션5 = 4)
const MISSION_ID = "mission5";   // 저장소에서 이 과제방을 구분하는 이름
const GOAL = 5;                  // 목표 도움 횟수
/* ═══════════════════════════════════════════════════════ */
// 상태: progress(모으는 중) / pending(제출·확인중) / hold(보류) / passed(통과)

const app = document.getElementById("app");
let db = null;
let currentName = null;
let records = [];      // {date, text} 배열
let photoMap = {};     // {인덱스: base64} - 기록별 사진 (선택)
let newPhoto = null;   // 추가 폼에서 고른 사진

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function remember(name){ try{ localStorage.setItem("bingo-name", name); }catch(e){} }
function recall(){ try{ return localStorage.getItem("bingo-name") || ""; }catch(e){ return ""; } }
function todayStr(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function prettyDate(iso){
  if(!iso) return "";
  const [y,m,d] = iso.split("-");
  return `${parseInt(m)}월 ${parseInt(d)}일`;
}

/* ─────────── 시작 ─────────── */
function init(){
  if(firebaseConfig.apiKey === "여기에_붙여넣기"){
    app.innerHTML = `
      <div class="card">
        <h2>🔧 선생님, 먼저 설정이 필요해요</h2>
        <p style="font-size:14px;line-height:1.8;word-break:keep-all;">
          이 파일을 열어 위쪽의 <b>firebaseConfig</b> 부분에
          빙고판과 똑같은 Firebase 설정값을 붙여 넣어 주세요.</p>
        <div class="setup-code">const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "프로젝트명.firebaseapp.com",
  projectId: "프로젝트명",
  ...
};</div>
      </div>`;
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }catch(e){
    app.innerHTML = `<div class="card"><h2>⚠️ 연결 오류</h2>
      <p style="font-size:14px;line-height:1.7;">Firebase 설정값이 올바른지 확인해 주세요.<br>오류: ${esc(e.message)}</p></div>`;
    return;
  }
  const params = new URLSearchParams(location.search);
  const nameFromUrl = (params.get("name") || "").trim().replace(/\s+/g,"");
  const saved = recall();
  if(nameFromUrl){ remember(nameFromUrl); enterStudent(nameFromUrl); }
  else if(saved){ enterStudent(saved); }
  else { renderLogin(); }
}

/* ─────────── 과제 설명 카드 ─────────── */
function guideCard(){
  return `
    <div class="card">
      <h2>💝 이렇게 해 보세요</h2>
      <ul class="howto">
        <li><span class="step">1</span>방학 동안 부모님(가족)을 도와드릴 수 있는 일을 찾아요. (예: 설거지, 청소, 빨래 개기, 동생 돌보기, 심부름)</li>
        <li><span class="step">2</span>도와드릴 때마다 이곳에 들어와 <b>도움 기록을 하나씩 추가</b>해요. 하트 도장이 하나씩 채워져요!</li>
        <li><span class="step">3</span>하트 <b>5개</b>를 모두 모으면 <b>제출하기</b> 버튼이 열려요.</li>
        <li><span class="step">4</span>제출하면 선생님이 확인하고 통과 도장을 찍어 줘요.</li>
      </ul>
      <div class="tip">💡 한꺼번에 몰아서 하는 것보다 방학 동안 꾸준히 나눠서 도와드리면 더 멋져요. 도와드린 모습을 사진으로 남기면 좋아요! (부모님께서 찍어 주시면 돼요)</div>
    </div>`;
}

/* ─────────── 로그인 ─────────── */
function renderLogin(){
  currentName = null;
  app.innerHTML = guideCard() + `
    <div class="card login-box">
      <h2>이름을 입력하고 하트를 모아요!</h2>
      <input id="nameInput" type="text" placeholder="예) 김하늘" maxlength="10" autocomplete="off">
      <button class="btn btn-main btn-block" id="startBtn">하트 모으러 가기 💗</button>
      <button class="btn btn-ghost" id="teacherBtn" style="margin-top:10px;">선생님 화면</button>
    </div>`;
  const input = document.getElementById("nameInput");
  const go = () => {
    const name = input.value.trim().replace(/\s+/g,"");
    if(name.length < 2){ toast("이름을 정확히 입력해 주세요!"); return; }
    remember(name);
    enterStudent(name);
  };
  document.getElementById("startBtn").onclick = go;
  input.addEventListener("keydown", e => { if(e.key==="Enter") go(); });
  document.getElementById("teacherBtn").onclick = renderTeacherLogin;
}

/* ─────────── Firestore 도우미 ─────────── */
function postRef(name){ return db.collection("missions").doc(MISSION_ID).collection("posts").doc(name); }
function studentRef(name){ return db.collection("students").doc(name); }

async function getPost(name){
  const snap = await postRef(name).get();
  return snap.exists ? snap.data() : null;
}
async function loadPhotos(name){
  const snap = await postRef(name).collection("photos").get();
  const map = {};
  snap.docs.forEach(d => { map[d.data().order] = d.data().data; });
  return map;
}
async function setStudentStatus(name, status){
  const ref = studentRef(name);
  const snap = await ref.get();
  let statuses = Array(9).fill("none");
  let extra = {};
  if(snap.exists){
    const d = snap.data();
    if(Array.isArray(d.statuses)) statuses = d.statuses.slice();
    while(statuses.length < 9) statuses.push("none");
    if(d.reflection) extra.reflection = d.reflection;
  }
  statuses[MISSION_INDEX] = status;
  await ref.set({ statuses, updatedAt: Date.now(), ...extra }, { merge: true });
}

// 기록/사진을 저장소에 저장 (요약 텍스트도 함께 생성해 빙고판에서 보이게)
async function savePost(status){
  const summary = records.map((r,i)=>`${"①②③④⑤⑥⑦⑧⑨⑩"[i]||("("+(i+1)+")")} ${prettyDate(r.date)} - ${r.text}`).join("\n");
  await postRef(currentName).set({
    name: currentName,
    subject: records.length + "회 / " + GOAL + "회",
    subjectLabel: "도움 횟수",
    place: "", placeLabel: "",
    text: summary,
    records: records,
    status: status,
    feedback: "",
    photoCount: Object.keys(photoMap).length,
    submittedAt: Date.now()
  });
  const photoCol = postRef(currentName).collection("photos");
  const old = await photoCol.get();
  const batch = db.batch();
  old.docs.forEach(d => batch.delete(d.ref));
  Object.entries(photoMap).forEach(([idx, data])=>{
    batch.set(photoCol.doc("p"+idx), { order: parseInt(idx), data });
  });
  await batch.commit();
}

/* ─────────── 학생 화면 ─────────── */
async function enterStudent(name){
  currentName = name;
  app.innerHTML = `<div class="loading">하트 도장판을 불러오는 중...</div>`;
  let post = null;
  try{
    post = await getPost(name);
    records = (post && Array.isArray(post.records)) ? post.records.slice() : [];
    photoMap = post ? await loadPhotos(name) : {};
  }catch(e){
    app.innerHTML = `<div class="card"><h2>⚠️ 불러오기 실패</h2>
      <p style="font-size:14px;line-height:1.7;word-break:keep-all;">인터넷 연결과 Firebase 설정을 확인해 주세요.<br>(${esc(e.message)})</p></div>`;
    return;
  }
  renderStudent(post ? post.status : "progress", post ? post.feedback : "");
}

function renderStudent(status, feedback){
  const st = status || "progress";
  const count = records.length;
  const editable = (st === "progress" || st === "hold" || st === "pending");

  let banner = "";
  if(st === "progress"){
    if(count === 0) banner = `<div class="status-banner none">💗 부모님을 도와드리고 첫 번째 하트를 채워 보세요!</div>`;
    else if(count < GOAL) banner = `<div class="status-banner none">💗 잘하고 있어요! 하트 ${GOAL - count}개만 더 모으면 제출할 수 있어요.</div>`;
    else banner = `<div class="status-banner none">🎊 하트 ${GOAL}개 완성! 아래 <b>제출하기</b> 버튼을 눌러 주세요!</div>`;
  } else if(st === "pending"){
    banner = `<div class="status-banner pending">📮 제출 완료! 선생님이 확인하고 있어요. 기록을 고쳐서 다시 제출할 수도 있어요.</div>`;
  } else if(st === "hold"){
    banner = `<div class="status-banner hold">😢 <b>보류</b>되었어요. 기록을 보완해서 다시 제출해 주세요!` +
      (feedback ? `<br>👩‍🏫 선생님 말씀: ${esc(feedback)}` : "") + `</div>`;
  } else if(st === "passed"){
    banner = `<div class="status-banner passed">🎉 <b>통과!</b> 부모님 도와드리기 미션 성공! 빙고판에 도장이 찍혔어요.</div>`;
  }

  const hearts = Array.from({length:GOAL}, (_,i)=>
    `<div class="heart ${i < count ? "filled" : ""}">💗</div>`).join("");

  const recordList = records.length
    ? records.map((r,i)=>`
      <div class="record-item">
        <div class="r-num">${i+1}</div>
        <div class="r-body">
          <div class="r-date">${prettyDate(r.date)}</div>
          <div class="r-text">${esc(r.text)}</div>
        </div>
        ${photoMap[i] ? `<img class="r-photo" src="${photoMap[i]}" alt="도움 사진" data-view="${i}">` : ""}
        ${editable && st !== "pending" ? `<button class="r-del" data-del="${i}" aria-label="기록 삭제">✕</button>` : ""}
      </div>`).join("")
    : `<div class="empty-msg">아직 기록이 없어요. 첫 번째 도움을 기록해 보세요!</div>`;

  const addFormHtml = (editable && st !== "pending" && count < GOAL) ? `
    <div class="card" id="addCard">
      <h2>✏️ 도움 기록 추가하기</h2>
      <div class="field">
        <label>언제 도와드렸나요?</label>
        <input type="date" id="dateInput" value="${todayStr()}" max="${todayStr()}">
      </div>
      <div class="field">
        <label>무엇을 도와드렸나요?</label>
        <input type="text" id="textInput" maxlength="60" placeholder="예) 저녁 설거지를 했다, 빨래를 개서 정리했다">
      </div>
      <div class="field">
        <label>도움 사진 <span class="opt">(선택 — 부모님이 찍어 주신 사진이 있다면)</span></label>
        <div class="photo-slot" id="photoSlot"></div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;">
      </div>
      <button class="btn btn-main btn-block" id="addBtn">하트 채우기 💗</button>
    </div>` : "";

  const submitBtnHtml = (st === "progress" || st === "hold") && count >= GOAL
    ? `<button class="btn btn-red btn-block" id="submitBtn" style="font-size:18px;">${st==="hold" ? "다시 제출하기 💪" : "선생님께 제출하기 📮"}</button>`
    : "";

  app.innerHTML = `
    <div class="topbar">
      <span class="who">🙋 ${esc(currentName)}</span>
      <div>
        <button class="mini-btn" id="refreshBtn">🔄 새로고침</button>
        <button class="mini-btn" id="logoutBtn">이름 바꾸기</button>
      </div>
    </div>
    ${banner}
    <div class="card">
      <div class="stamp-label">모은 하트 <b>${count}</b> / ${GOAL}</div>
      <div class="stamp-board">${hearts}</div>
    </div>
    ${guideCard()}
    <div class="card">
      <h2>📋 나의 도움 기록</h2>
      ${recordList}
      ${submitBtnHtml}
    </div>
    ${addFormHtml}`;

  document.getElementById("refreshBtn").onclick = () => enterStudent(currentName);
  document.getElementById("logoutBtn").onclick = () => { try{localStorage.removeItem("bingo-name");}catch(e){} renderLogin(); };

  // 기록 사진 크게 보기 / 삭제
  app.querySelectorAll("[data-view]").forEach(img=>{ img.onclick = ()=>openLightbox(img.src); });
  app.querySelectorAll("[data-del]").forEach(btn=>{
    btn.onclick = async ()=>{
      const idx = parseInt(btn.dataset.del);
      if(!confirm((idx+1) + "번 기록을 지울까요?")) return;
      records.splice(idx, 1);
      // 사진 인덱스 당겨서 다시 정리
      const newMap = {};
      Object.entries(photoMap).forEach(([k,v])=>{
        const ki = parseInt(k);
        if(ki < idx) newMap[ki] = v;
        else if(ki > idx) newMap[ki-1] = v;
      });
      photoMap = newMap;
      try{
        await savePost(st === "hold" ? "hold" : "progress");
        toast("기록을 지웠어요.");
      }catch(e){ toast("저장에 실패했어요. 다시 시도해 주세요."); }
      renderStudent(st === "hold" ? "hold" : "progress", feedback);
    };
  });

  // 추가 폼
  if(document.getElementById("addCard")){
    newPhoto = null;
    renderPhotoSlot();
    document.getElementById("photoInput").addEventListener("change", handlePhotoSelect);
    document.getElementById("addBtn").onclick = async ()=>{
      const date = document.getElementById("dateInput").value || todayStr();
      const text = document.getElementById("textInput").value.trim();
      if(text.length < 3){ toast("무엇을 도와드렸는지 써 주세요!"); return; }
      const btn = document.getElementById("addBtn");
      btn.disabled = true; btn.textContent = "저장하는 중...";
      records.push({ date, text });
      if(newPhoto) photoMap[records.length - 1] = newPhoto;
      try{
        await savePost(st === "hold" ? "hold" : "progress");
        toast(records.length >= GOAL ? "하트 " + GOAL + "개 완성! 🎊 제출해 보세요!" : "하트가 채워졌어요! 💗");
        renderStudent(st === "hold" ? "hold" : "progress", feedback);
      }catch(e){
        records.pop();
        if(newPhoto) delete photoMap[records.length];
        btn.disabled = false; btn.textContent = "하트 채우기 💗";
        toast("저장에 실패했어요. 인터넷 연결을 확인해 주세요.");
      }
    };
  }

  // 제출
  const submitBtn = document.getElementById("submitBtn");
  if(submitBtn) submitBtn.onclick = async ()=>{
    submitBtn.disabled = true; submitBtn.textContent = "제출하는 중...";
    try{
      await savePost("pending");
      await setStudentStatus(currentName, "pending");
      toast("제출했어요! 선생님 확인을 기다려요 📮");
      enterStudent(currentName);
    }catch(e){
      submitBtn.disabled = false; submitBtn.textContent = "선생님께 제출하기 📮";
      toast("제출에 실패했어요. 다시 시도해 주세요.");
    }
  };
}

/* ─────────── 사진(1장) 처리 ─────────── */
function renderPhotoSlot(){
  const slot = document.getElementById("photoSlot");
  if(!slot) return;
  if(newPhoto){
    slot.innerHTML = `<img class="thumb" src="${newPhoto}" alt="선택한 사진">
      <button class="remove" id="removePhoto">사진 빼기</button>`;
    slot.querySelector(".thumb").onclick = ()=>openLightbox(newPhoto);
    document.getElementById("removePhoto").onclick = ()=>{ newPhoto = null; renderPhotoSlot(); };
  } else {
    slot.innerHTML = `<div class="add" id="addPhoto" role="button" tabindex="0"><span>📷</span><span>사진</span></div>`;
    const add = document.getElementById("addPhoto");
    const open = ()=>document.getElementById("photoInput").click();
    add.onclick = open;
    add.onkeydown = e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();open();} };
  }
}

async function handlePhotoSelect(e){
  const file = (e.target.files || [])[0];
  e.target.value = "";
  if(!file || !file.type.startsWith("image/")) return;
  try{
    newPhoto = await compressImage(file);
    renderPhotoSlot();
  }catch(err){
    toast("사진을 불러오지 못했어요. 다른 사진으로 시도해 보세요.");
  }
}

function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("read fail"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error("img fail"));
      img.onload = ()=>{
        const MAX = 1000;
        let w = img.width, h = img.height;
        if(w > MAX || h > MAX){
          const r = Math.min(MAX/w, MAX/h);
          w = Math.round(w*r); h = Math.round(h*r);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        let q = 0.75;
        let out = canvas.toDataURL("image/jpeg", q);
        while(out.length > 700000 && q > 0.3){
          q -= 0.1;
          out = canvas.toDataURL("image/jpeg", q);
        }
        if(out.length > 900000) reject(new Error("too big"));
        else resolve(out);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function openLightbox(src){
  const lb = document.createElement("div");
  lb.className = "lightbox";
  lb.innerHTML = `<img src="${src}" alt="사진 크게 보기">`;
  lb.onclick = ()=>lb.remove();
  document.body.appendChild(lb);
}

/* ─────────── 교사 화면 ─────────── */
function renderTeacherLogin(){
  currentName = null;
  app.innerHTML = `
    <div class="card login-box">
      <h2>👩‍🏫 선생님 확인</h2>
      <input id="pinInput" type="password" placeholder="비밀번호 입력" maxlength="10" inputmode="numeric">
      <button class="btn btn-navy btn-block" id="pinBtn">들어가기</button>
      <button class="btn btn-ghost" id="backBtn" style="margin-top:10px;">← 학생 화면으로</button>
    </div>`;
  const input = document.getElementById("pinInput");
  const go = ()=>{
    if(input.value === TEACHER_PIN) renderTeacher();
    else { toast("비밀번호가 달라요!"); input.value=""; }
  };
  document.getElementById("pinBtn").onclick = go;
  input.addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
  document.getElementById("backBtn").onclick = renderLogin;
  input.focus();
}

async function renderTeacher(){
  app.innerHTML = `<div class="loading">도움 기록을 불러오는 중...</div>`;
  let posts = [];
  try{
    const snap = await db.collection("missions").doc(MISSION_ID).collection("posts")
      .orderBy("submittedAt","desc").get();
    posts = snap.docs.map(d=>d.data());
  }catch(e){
    app.innerHTML = `<div class="card"><h2>⚠️ 불러오기 실패</h2><p style="font-size:14px;">${esc(e.message)}</p></div>`;
    return;
  }

  const order = { pending:0, hold:1, progress:2, passed:3 };
  posts.sort((a,b)=>(order[a.status]??4)-(order[b.status]??4) || b.submittedAt - a.submittedAt);
  const label = { pending:"확인 대기", hold:"보류", passed:"통과", progress:"모으는 중" };

  const items = posts.length ? posts.map(p=>{
    const recs = Array.isArray(p.records) ? p.records : [];
    const recHtml = recs.map((r,i)=>`
      <div class="record-item" style="margin-bottom:8px;">
        <div class="r-num">${i+1}</div>
        <div class="r-body">
          <div class="r-date">${prettyDate(r.date)}</div>
          <div class="r-text">${esc(r.text)}</div>
        </div>
        <span class="r-photo-slot" data-photo-of="${esc(p.name)}" data-photo-idx="${i}"></span>
      </div>`).join("") || `<div class="empty-msg">기록 없음</div>`;
    return `
    <div class="post-item" data-name="${esc(p.name)}">
      <div class="p-head">
        <span class="p-name">🙋 ${esc(p.name)}</span>
        <span class="p-badge ${p.status}">${label[p.status]||p.status}</span>
      </div>
      <div class="p-meta">도움 횟수: <b>${recs.length} / ${GOAL}회</b> · 마지막 저장: ${new Date(p.submittedAt).toLocaleString("ko-KR")}</div>
      ${recHtml}
      ${(p.status === "pending" || p.status === "hold") ? `
      <div class="field" style="margin:8px 0;">
        <input type="text" data-feedback="${esc(p.name)}" maxlength="100" placeholder="보류 시 학생에게 보낼 한마디 (선택)" value="${esc(p.feedback||"")}" style="width:100%;font-family:inherit;font-size:13px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;outline:none;">
      </div>
      <div class="p-btns">
        <button class="btn btn-green" data-act="passed" data-name="${esc(p.name)}">✅ 통과</button>
        <button class="btn btn-red" data-act="hold" data-name="${esc(p.name)}">↩️ 보류</button>
      </div>` : ``}
    </div>`;
  }).join("")
    : `<div class="empty-msg">아직 기록을 시작한 학생이 없어요.</div>`;

  app.innerHTML = `
    <div class="topbar">
      <span class="who">👩‍🏫 선생님 화면</span>
      <div>
        <button class="mini-btn" id="refreshBtn">🔄 새로고침</button>
        <button class="mini-btn" id="logoutBtn">나가기</button>
      </div>
    </div>
    <div class="card">
      <h2>📮 학생별 도움 기록 (${posts.length}명)</h2>
      ${items}
    </div>`;

  document.getElementById("refreshBtn").onclick = renderTeacher;
  document.getElementById("logoutBtn").onclick = renderLogin;

  // 기록별 사진 지연 로딩
  posts.forEach(async p=>{
    const slots = app.querySelectorAll(`[data-photo-of="${CSS.escape(p.name)}"]`);
    if(!slots.length) return;
    try{
      const snap = await postRef(p.name).collection("photos").get();
      const map = {};
      snap.docs.forEach(d => { map[d.data().order] = d.data().data; });
      slots.forEach(slot=>{
        const idx = parseInt(slot.dataset.photoIdx);
        if(map[idx]){
          slot.innerHTML = `<img class="r-photo" src="${map[idx]}" alt="도움 사진">`;
          slot.querySelector("img").onclick = ()=>openLightbox(map[idx]);
        }
      });
    }catch(e){}
  });

  app.querySelectorAll("[data-act]").forEach(btn=>{
    btn.onclick = async ()=>{
      const name = btn.dataset.name, act = btn.dataset.act;
      btn.disabled = true;
      const fbInput = app.querySelector(`[data-feedback="${CSS.escape(name)}"]`);
      const feedback = fbInput ? fbInput.value.trim() : "";
      try{
        await postRef(name).set({ status: act, feedback }, { merge:true });
        await setStudentStatus(name, act);
        toast(act==="passed" ? `${name} 통과 처리! 빙고판에 도장이 찍혔어요.` : `${name} 보류 처리했어요.`);
        renderTeacher();
      }catch(e){
        btn.disabled = false;
        toast("처리에 실패했어요. 다시 시도해 주세요.");
      }
    };
  });
}

init();
</script>
