<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미션 빙고! - 여름방학 과제</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#CDE8F6;
    --card-blue:#E3F2FD;
    --card-cream:#FFF7E8;
    --title-red:#E8493A;
    --navy:#1B4B8F;
    --ink:#2B2B2B;
    --pass:#2E9E5B;
    --pending:#F59E0B;
    --hold:#E8493A;
    --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Gowun Dodum',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 14px 60px;}

  /* ── 타이틀 ── */
  .hero{text-align:center;padding:24px 0 8px;}
  .hero h1{
    font-family:'Jua',sans-serif;
    font-size:clamp(38px,10vw,54px);
    color:var(--title-red);
    letter-spacing:2px;
    text-shadow:3px 3px 0 rgba(27,75,143,.15);
  }
  .hero .ribbon{
    display:inline-block;
    background:var(--navy);
    color:#fff;
    font-size:13px;
    padding:6px 16px;
    border-radius:999px;
    margin-top:10px;
  }

  /* ── 로그인 ── */
  .login-card{
    background:var(--white);
    border-radius:20px;
    padding:28px 22px;
    margin-top:24px;
    box-shadow:0 6px 20px rgba(27,75,143,.12);
    text-align:center;
  }
  .login-card h2{font-family:'Jua',sans-serif;color:var(--navy);font-size:20px;margin-bottom:14px;}
  .login-card input{
    width:100%;
    font-family:'Gowun Dodum',sans-serif;
    font-size:18px;
    padding:13px 16px;
    border:2px solid #B9DCF2;
    border-radius:12px;
    outline:none;
    text-align:center;
  }
  .login-card input:focus{border-color:var(--navy);}
  .btn{
    font-family:'Jua',sans-serif;
    font-size:17px;
    border:none;
    border-radius:12px;
    padding:13px 22px;
    cursor:pointer;
    transition:transform .1s;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--title-red);color:#fff;width:100%;margin-top:12px;}
  .btn-navy{background:var(--navy);color:#fff;}
  .btn-ghost{background:transparent;color:var(--navy);font-size:14px;text-decoration:underline;}
  .teacher-link{margin-top:18px;}

  /* ── 상단바 ── */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--white);
    border-radius:14px;
    padding:10px 16px;
    margin-bottom:14px;
    box-shadow:0 3px 10px rgba(27,75,143,.1);
  }
  .topbar .who{font-family:'Jua',sans-serif;color:var(--navy);font-size:17px;}
  .topbar .actions{display:flex;gap:8px;}
  .mini-btn{
    font-family:'Gowun Dodum',sans-serif;
    font-size:13px;border:1.5px solid #B9DCF2;background:#F4FAFF;
    border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--navy);
  }

  /* ── 빙고 현황 ── */
  .bingo-count{
    text-align:center;
    font-family:'Jua',sans-serif;
    font-size:18px;
    color:var(--navy);
    margin-bottom:14px;
  }
  .bingo-count strong{color:var(--title-red);font-size:26px;}

  /* ── 빙고판 ── */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .cell{
    position:relative;
    border-radius:18px;
    padding:18px 10px;
    min-height:128px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:13.5px;
    line-height:1.45;
    cursor:pointer;
    border:2.5px solid transparent;
    box-shadow:0 3px 8px rgba(27,75,143,.08);
    transition:transform .12s, box-shadow .12s;
    word-break:keep-all;
  }
  .cell:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(27,75,143,.16);}
  .cell.blue{background:var(--card-blue);}
  .cell.cream{background:var(--card-cream);}
  .cell.passed{border-color:var(--pass);}
  .cell.pending{border-color:var(--pending);}
  .cell.hold{border-color:var(--hold);}
  .badge{
    position:absolute;top:8px;right:8px;
    font-size:10.5px;font-family:'Jua',sans-serif;
    padding:3px 8px;border-radius:999px;color:#fff;
  }
  .badge.pending{background:var(--pending);}
  .badge.hold{background:var(--hold);}
  .stamp{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .stamp span{
    font-family:'Jua',sans-serif;
    font-size:30px;
    color:var(--pass);
    border:3.5px solid var(--pass);
    border-radius:50%;
    width:78px;height:78px;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-14deg);
    background:rgba(255,255,255,.72);
    box-shadow:0 2px 6px rgba(46,158,91,.3);
  }

  /* ── 모달 ── */
  .overlay{
    position:fixed;inset:0;background:rgba(20,40,70,.45);
    display:flex;align-items:center;justify-content:center;
    padding:16px;z-index:50;
  }
  .modal{
    background:#fff;border-radius:20px;
    width:100%;max-width:440px;
    max-height:86vh;overflow-y:auto;
    padding:26px 22px;
    box-shadow:0 12px 40px rgba(0,0,0,.25);
  }
  .modal h3{font-family:'Jua',sans-serif;color:var(--navy);font-size:20px;line-height:1.4;margin-bottom:8px;word-break:keep-all;}
  .modal .status-line{font-size:14px;margin:10px 0 16px;padding:10px 14px;border-radius:10px;background:#F4FAFF;line-height:1.6;}
  .modal .status-line.hold-msg{background:#FDEBEA;color:#B33227;}
  .modal .status-line.pass-msg{background:#E9F7EF;color:#1F7A43;}
  .modal .btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .modal .btn-row .btn{flex:1;min-width:120px;}
  .btn-green{background:var(--pass);color:#fff;}
  .btn-outline{background:#fff;color:var(--navy);border:2px solid var(--navy);}
  .btn-gray{background:#E5E7EB;color:#555;}
  .close-x{
    float:right;border:none;background:none;font-size:22px;cursor:pointer;color:#999;
  }

  /* ── 교사 화면 ── */
  .section{
    background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;
    box-shadow:0 3px 10px rgba(27,75,143,.1);
  }
  .section h3{font-family:'Jua',sans-serif;color:var(--navy);font-size:17px;margin-bottom:12px;}
  .review-item{
    border:1.5px solid #E3EEF7;border-radius:12px;padding:12px 14px;margin-bottom:10px;
  }
  .review-item .r-name{font-family:'Jua',sans-serif;color:var(--title-red);font-size:15px;}
  .review-item .r-mission{font-size:13.5px;margin:4px 0 10px;line-height:1.5;word-break:keep-all;}
  .review-item .r-btns{display:flex;gap:8px;}
  .review-item .r-btns .btn{font-size:14px;padding:8px 14px;flex:1;}
  .student-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 4px;border-bottom:1px dashed #D8E8F4;font-size:14px;
  }
  .student-row:last-child{border-bottom:none;}
  .dots{display:flex;gap:4px;}
  .dot{width:13px;height:13px;border-radius:4px;background:#E3EEF7;}
  .dot.p{background:var(--pass);}
  .dot.w{background:var(--pending);}
  .dot.h{background:var(--hold);}
  .link-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .link-row .l-name{font-size:12px;width:110px;flex-shrink:0;word-break:keep-all;line-height:1.4;}
  .link-row input{
    flex:1;font-size:12px;padding:7px 10px;border:1.5px solid #D8E8F4;border-radius:8px;outline:none;
    font-family:inherit;
  }
  .empty-msg{font-size:14px;color:#8AA5BD;text-align:center;padding:14px 0;}

  /* ── 학생별 현황 클릭/상세 ── */
  .student-row{cursor:pointer;}
  .student-row.clickable:hover{background:#F4FAFF;border-radius:8px;}
  .student-row .chev{color:#B9DCF2;font-size:13px;margin-left:6px;}
  .student-detail{
    background:#F7FBFF;border:1.5px solid #E3EEF7;border-radius:12px;
    padding:12px 14px;margin:6px 0 12px;
  }
  .sd-mission{
    border-bottom:1px dashed #D8E8F4;padding:10px 0;
  }
  .sd-mission:last-child{border-bottom:none;}
  .sd-mhead{font-family:'Jua',sans-serif;font-size:14px;color:var(--navy);margin-bottom:4px;word-break:keep-all;}
  .sd-meta{font-size:11.5px;color:#8AA5BD;margin-bottom:5px;}
  .sd-text{
    font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;
    background:#fff;border-radius:8px;padding:8px 10px;
  }
  .sd-photos{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .sd-photos img{width:66px;height:66px;object-fit:cover;border-radius:8px;border:1.5px solid #D8E8F4;cursor:pointer;}
  .sd-none{font-size:12.5px;color:#B9C5D3;}
  .complete-badge{
    display:inline-block;background:var(--pass);color:#fff;
    font-family:'Jua',sans-serif;font-size:11px;
    padding:2px 9px;border-radius:999px;margin-left:6px;
  }
  .pdf-btn{
    background:var(--pass);color:#fff;border:none;
    font-family:'Jua',sans-serif;font-size:13px;
    padding:9px 14px;border-radius:10px;cursor:pointer;
    margin-top:10px;width:100%;
  }
  .pdf-btn:disabled{opacity:.6;cursor:default;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;padding:11px 22px;border-radius:999px;
    font-size:14px;z-index:100;box-shadow:0 4px 14px rgba(0,0,0,.25);
    animation:pop .2s;
  }
  @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .hidden{display:none;}
  .loading{text-align:center;padding:40px 0;font-family:'Jua',sans-serif;color:var(--navy);}

  /* ── 소감문 ── */
  .reflect-card{
    margin-top:16px;
    background:var(--white);
    border-radius:18px;
    padding:18px;
    box-shadow:0 3px 10px rgba(27,75,143,.1);
    text-align:center;
  }
  .reflect-card h3{font-family:'Jua',sans-serif;color:var(--navy);font-size:17px;margin-bottom:8px;}
  .reflect-card p{font-size:13.5px;color:#6B8AA6;line-height:1.6;margin-bottom:12px;word-break:keep-all;}
  .reflect-card.locked{opacity:.75;}
  .reflect-preview{
    background:#F4FAFF;border-radius:12px;padding:12px 14px;
    font-size:13.5px;line-height:1.7;text-align:left;
    margin-bottom:12px;white-space:pre-wrap;word-break:break-word;
    max-height:140px;overflow-y:auto;
  }
  .modal textarea{
    width:100%;min-height:180px;
    font-family:'Gowun Dodum',sans-serif;font-size:15px;line-height:1.7;
    padding:12px 14px;border:2px solid #B9DCF2;border-radius:12px;
    outline:none;resize:vertical;
  }
  .modal textarea:focus{border-color:var(--navy);}
  .char-count{text-align:right;font-size:12px;color:#8AA5BD;margin-top:4px;}
  .reflect-item{
    border:1.5px solid #E3EEF7;border-radius:12px;padding:12px 14px;margin-bottom:10px;
  }
  .reflect-item .r-name{font-family:'Jua',sans-serif;color:var(--navy);font-size:15px;margin-bottom:6px;}
  .reflect-item .r-text{font-size:13.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .reflect-item .r-date{font-size:11.5px;color:#8AA5BD;margin-top:6px;}
  .setup-code{
    background:#22314A;color:#CFE4F7;border-radius:12px;
    padding:14px;font-family:monospace;font-size:12px;
    line-height:1.7;overflow-x:auto;margin:10px 0;white-space:pre;text-align:left;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   ★ 설정 구역 — 선생님이 이 부분만 수정하면 됩니다 ★
   ═══════════════════════════════════════════════════════
   과제방(mission1.html)에 붙여 넣은 것과 똑같은
   firebaseConfig 값을 아래에 붙여 넣으세요.
*/
const firebaseConfig = {
  apiKey: "AIzaSyCBgz3oLm_dgKBFwGglidasKoENI5PNs7I",
  authDomain: "summer-vacation-mission.firebaseapp.com",

  appId: "1:171875205794:web:a5cca666fedc22c2b5cdfb",
  measurementId: "G-H9QZ9NXR39"
};
const TEACHER_PIN = "dlfyd34@";   // 선생님 비밀번호
const MISSIONS = [
  "여름에 볼 수 있는 식물(곤충) 관찰, 조사하기",
  "음식을 만들고 그림(사진)이 들어간 보고서 쓰기",
  "광복절 태극기 달기",
  "영화를 보고 기억에 남는 장면 주제 글쓰기",
  "부모님 도와드리기 (5회)",
  "선생님, 친구, 부모님 중 1명에게 편지쓰기",
  "온라인 국립중앙박물관 체험하고 보고서 쓰기",
  "재활용품을 활용해 만들기 하기",
  "가족 중 한 명에게 인터뷰하기"
];
/* ═══════════════════════════════════════════════════════ */
// 상태: none(미시작) / pending(제출·확인중) / hold(보류) / passed(통과)

const app = document.getElementById("app");
let db = null;
let currentName = null;
let unsubscribe = null;   // 실시간 감시 해제용

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function remember(name){ try{ localStorage.setItem("bingo-name", name); }catch(e){} }
function recall(){ try{ return localStorage.getItem("bingo-name") || ""; }catch(e){ return ""; } }
function stopWatch(){ if(unsubscribe){ unsubscribe(); unsubscribe = null; } }

function countBingo(statuses){
  const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return lines.filter(l => l.every(i => statuses[i] === "passed")).length;
}
function normalizeStatuses(d){
  let s = (d && Array.isArray(d.statuses)) ? d.statuses.slice() : [];
  while(s.length < 9) s.push("none");
  return s.slice(0,9);
}

/* ─────────── Firestore 도우미 ─────────── */
function studentRef(name){ return db.collection("students").doc(name); }
async function getLinks(){
  try{
    const snap = await db.collection("config").doc("links").get();
    return snap.exists ? snap.data() : {};
  }catch(e){ return {}; }
}

/* ─────────── 시작 ─────────── */
function init(){
  if(firebaseConfig.apiKey === "여기에_붙여넣기"){
    app.innerHTML = `
      <div class="section" style="margin-top:24px;">
        <h3>🔧 선생님, 먼저 설정이 필요해요</h3>
        <p style="font-size:14px;line-height:1.8;word-break:keep-all;">
          이 파일을 열어 위쪽의 <b>firebaseConfig</b> 부분에
          과제방과 똑같은 Firebase 설정값을 붙여 넣어 주세요.</p>
        <div class="setup-code">const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "프로젝트명.firebaseapp.com",
  projectId: "프로젝트명",
  ...
};</div>
        <p style="font-size:13px;line-height:1.8;color:#6B8AA6;word-break:keep-all;">
          📍 위치: Firebase 콘솔 → ⚙️ 프로젝트 설정 → 일반 → 내 앱 → SDK 설정 및 구성 → "구성" 선택</p>
      </div>`;
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }catch(e){
    app.innerHTML = `<div class="section" style="margin-top:24px;"><h3>⚠️ 연결 오류</h3>
      <p style="font-size:14px;line-height:1.7;">firebaseConfig 값이 올바른지 확인해 주세요.<br>(${esc(e.message)})</p></div>`;
    return;
  }
  const saved = recall();
  if(saved) enterStudent(saved);
  else renderLogin();
}

/* ─────────── 로그인 화면 ─────────── */
function renderLogin(){
  stopWatch(); currentName = null;
  app.innerHTML = `
    <div class="login-card">
      <h2>이름을 입력하고 시작해요!</h2>
      <input id="nameInput" type="text" placeholder="예) 김하늘" maxlength="10" autocomplete="off">
      <button class="btn btn-primary" id="startBtn">내 빙고판 열기</button>
      <div class="teacher-link">
        <button class="btn btn-ghost" id="teacherBtn">선생님 화면으로 가기</button>
      </div>
    </div>`;
  const input = document.getElementById("nameInput");
  const go = () => {
    const name = input.value.trim().replace(/\s+/g,"");
    if(!name){ toast("이름을 입력해 주세요!"); return; }
    if(name.length < 2){ toast("이름을 정확히 입력해 주세요!"); return; }
    remember(name);
    enterStudent(name);
  };
  document.getElementById("startBtn").onclick = go;
  input.addEventListener("keydown", e => { if(e.key === "Enter") go(); });
  document.getElementById("teacherBtn").onclick = renderTeacherLogin;
  input.focus();
}

/* ─────────── 학생 화면 (실시간) ─────────── */
async function enterStudent(name){
  stopWatch();
  currentName = name;
  app.innerHTML = `<div class="loading">빙고판을 불러오는 중...</div>`;

  let links = await getLinks();

  // 처음 접속이면 학생 문서 만들기
  try{
    const snap = await studentRef(name).get();
    if(!snap.exists){
      await studentRef(name).set({ statuses: Array(9).fill("none"), updatedAt: Date.now() });
    }
  }catch(e){
    app.innerHTML = `<div class="section" style="margin-top:24px;"><h3>⚠️ 불러오기 실패</h3>
      <p style="font-size:14px;line-height:1.7;word-break:keep-all;">인터넷 연결과 Firebase 설정을 확인해 주세요.<br>(${esc(e.message)})</p></div>`;
    return;
  }

  // 실시간 감시: 선생님이 통과/보류 처리하면 즉시 화면에 반영
  unsubscribe = studentRef(name).onSnapshot(snap => {
    if(currentName !== name) return;
    const d = snap.exists ? snap.data() : {};
    renderStudent(d, links);
  }, err => {
    console.error(err);
  });
}

function renderStudent(d, links){
  const statuses = normalizeStatuses(d);
  const bingo = countBingo(statuses);
  const passedCount = statuses.filter(s=>s==="passed").length;
  const openModal = document.querySelector(".overlay");
  if(openModal) return; // 모달 열려 있을 때는 화면 갱신 미루기

  const cells = MISSIONS.map((m,i)=>{
    const st = statuses[i];
    const color = (i % 2 === 0) ? "blue" : "cream";
    let badge = "", stamp = "";
    if(st==="pending") badge = `<span class="badge pending">확인 중</span>`;
    if(st==="hold")    badge = `<span class="badge hold">보류</span>`;
    if(st==="passed")  stamp = `<div class="stamp"><span>통과</span></div>`;
    return `<div class="cell ${color} ${st!=="none"?st:""}" data-i="${i}" role="button" tabindex="0">
      ${badge}${esc(m)}${stamp}
    </div>`;
  }).join("");

  // 소감문 카드 (빙고 2줄 이상 완성 시 잠금 해제)
  let reflectHtml = "";
  if(bingo >= 2){
    if(d.reflection && d.reflection.text){
      reflectHtml = `
        <div class="reflect-card">
          <h3>📝 나의 방학 소감문</h3>
          <div class="reflect-preview">${esc(d.reflection.text)}</div>
          <button class="btn btn-navy" id="reflectBtn" style="width:100%;">소감문 고쳐 쓰기 ✏️</button>
        </div>`;
    } else {
      reflectHtml = `
        <div class="reflect-card">
          <h3>🎊 빙고 2줄 완성 축하해요!</h3>
          <p>미션 빙고를 하면서 어떤 점이 재미있었는지,<br>무엇을 새로 배웠는지 소감문을 써 볼까요?</p>
          <button class="btn btn-primary" id="reflectBtn" style="width:100%;margin:0;">소감문 쓰기 ✍️</button>
        </div>`;
    }
  } else {
    reflectHtml = `
      <div class="reflect-card locked">
        <h3>🔒 소감문 쓰기</h3>
        <p>빙고 <b>2줄</b>을 완성하면 소감문을 쓸 수 있어요.<br>미션에 도전해 보세요!</p>
      </div>`;
  }

  app.innerHTML = `
    <div class="topbar">
      <span class="who">🙋 ${esc(currentName)}</span>
      <div class="actions">
        <button class="mini-btn" id="logoutBtn">이름 바꾸기</button>
      </div>
    </div>
    <div class="bingo-count">지금까지 <strong>${bingo}</strong> 빙고! <span style="font-size:14px;">(통과한 미션 ${passedCount}개)</span></div>
    <div class="grid">${cells}</div>
    ${reflectHtml}`;

  document.getElementById("logoutBtn").onclick = () => {
    try{ localStorage.removeItem("bingo-name"); }catch(e){}
    renderLogin();
  };
  app.querySelectorAll(".cell").forEach(c=>{
    const open = () => openMission(parseInt(c.dataset.i), statuses, links);
    c.onclick = open;
    c.onkeydown = e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); open(); } };
  });
  const reflectBtn = document.getElementById("reflectBtn");
  if(reflectBtn) reflectBtn.onclick = () => openReflection(d);
}

function openMission(i, statuses, links){
  const st = statuses[i];
  const link = links[i] || links[String(i)];
  let statusHtml = "";

  if(st==="none"){
    statusHtml = `<div class="status-line">아직 시작하지 않은 미션이에요.<br><b>과제방에 들어가서</b> 미션을 수행하고 제출해 주세요!</div>`;
  } else if(st==="pending"){
    statusHtml = `<div class="status-line">📮 제출 완료! 선생님이 확인하고 있어요.<br>조금만 기다려 주세요.</div>`;
  } else if(st==="hold"){
    statusHtml = `<div class="status-line hold-msg">😢 <b>보류</b>되었어요. 과제방에서 미션을 보완해 다시 제출해 주세요!</div>`;
  } else {
    statusHtml = `<div class="status-line pass-msg">🎉 <b>통과!</b> 미션 성공! 정말 잘했어요!</div>`;
  }

  // 과제방으로 이동할 때 이름을 주소에 함께 실어 보내기 (이름 다시 입력 안 해도 됨)
  const linkWithName = link ? link + (link.includes("?") ? "&" : "?") + "name=" + encodeURIComponent(currentName) : null;
  const linkBtn = link
    ? `<a href="${esc(linkWithName)}" style="text-decoration:none;flex:1;min-width:120px;"><button class="btn btn-navy" style="width:100%;">과제방 들어가기 🚪</button></a>`
    : `<button class="btn btn-outline" disabled style="opacity:.55;cursor:default;">과제방 준비 중이에요 🔧</button>`;

  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `
    <div class="modal">
      <button class="close-x" aria-label="닫기">✕</button>
      <h3>미션 ${i+1}. ${esc(MISSIONS[i])}</h3>
      ${statusHtml}
      <div class="btn-row">${linkBtn}</div>
    </div>`;
  document.body.appendChild(ov);
  const close = () => ov.remove();
  ov.querySelector(".close-x").onclick = close;
  ov.addEventListener("click", e => { if(e.target === ov) close(); });
}

/* ─────────── 소감문 ─────────── */
function openReflection(d){
  const existing = (d.reflection && d.reflection.text) ? d.reflection.text : "";
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `
    <div class="modal">
      <button class="close-x" aria-label="닫기">✕</button>
      <h3>📝 방학 미션 빙고 소감문</h3>
      <div class="status-line">미션을 하면서 <b>재미있었던 일</b>, <b>새롭게 배운 점</b>, <b>힘들었지만 해낸 일</b>을 자유롭게 써 보세요!</div>
      <textarea id="reflectText" maxlength="1000" placeholder="예) 재활용품 만들기를 하면서 우유갑으로 연필꽂이를 만들었다. 처음에는 어려웠지만...">${esc(existing)}</textarea>
      <div class="char-count"><span id="charNow">${existing.length}</span> / 1000자</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveReflectBtn">소감문 제출하기 📮</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const close = () => ov.remove();
  ov.querySelector(".close-x").onclick = close;
  ov.addEventListener("click", e => { if(e.target === ov) close(); });

  const ta = ov.querySelector("#reflectText");
  const counter = ov.querySelector("#charNow");
  ta.addEventListener("input", () => { counter.textContent = ta.value.length; });
  ta.focus();

  ov.querySelector("#saveReflectBtn").onclick = async () => {
    const text = ta.value.trim();
    if(text.length < 10){ toast("소감문을 10자 이상 써 주세요!"); return; }
    try{
      await studentRef(currentName).set({ reflection: { text, savedAt: Date.now() }, updatedAt: Date.now() }, { merge:true });
      close(); toast("소감문을 제출했어요! 참 잘했어요 🌟");
    }catch(e){
      toast("제출에 실패했어요. 인터넷 연결을 확인해 주세요.");
    }
  };
}

/* ─────────── 사진 크게 보기 ─────────── */
function openLightbox(src){
  const lb = document.createElement("div");
  lb.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer;padding:16px;";
  lb.innerHTML = `<img src="${src}" alt="사진 크게 보기" style="max-width:100%;max-height:90vh;border-radius:12px;">`;
  lb.onclick = ()=>lb.remove();
  document.body.appendChild(lb);
}

    <div class="login-card">

/* ─────────── 교사 대시보드 ─────────── */
async function renderTeacher(){
  stopWatch();
  app.innerHTML = `<div class="loading">학생 자료를 불러오는 중...</div>`;

  let students = [];
  let links = {};
  try{
    const snap = await db.collection("students").get();
    students = snap.docs.map(doc => ({ name: doc.id, ...doc.data() }));
    links = await getLinks();
  }catch(e){
    app.innerHTML = `<div class="section" style="margin-top:24px;"><h3>⚠️ 불러오기 실패</h3>
      <p style="font-size:14px;">${esc(e.message)}</p></div>`;
    return;
  }
  students.sort((a,b)=>a.name.localeCompare(b.name,"ko"));

  // 확인 대기 목록
  const pendingItems = [];
  for(const s of students){
    normalizeStatuses(s).forEach((st,i)=>{
      if(st==="pending") pendingItems.push({name:s.name, i});
    });
  }
  const pendingHtml = pendingItems.length
    ? pendingItems.map((p,idx) => `
      <div class="review-item">
        <div class="r-name">🙋 ${esc(p.name)}</div>
        <div class="r-mission">미션 ${p.i+1}. ${esc(MISSIONS[p.i])}</div>
        <div class="r-content" id="content-${idx}" data-name="${esc(p.name)}" data-i="${p.i}">
          <span style="font-size:12px;color:#8AA5BD;">제출 내용을 불러오는 중...</span>
        </div>
        <div style="margin:8px 0;">
          <input type="text" data-feedback-idx="${idx}" maxlength="100" placeholder="보류 시 학생에게 보낼 한마디 (선택)" style="width:100%;font-family:inherit;font-size:13px;padding:9px 12px;border:1.5px solid #D8E8F4;border-radius:10px;outline:none;">
        </div>
        <div class="r-btns">
          <button class="btn btn-green" data-act="passed" data-name="${esc(p.name)}" data-i="${p.i}" data-idx="${idx}">✅ 통과</button>
          <button class="btn btn-primary" data-act="hold" data-name="${esc(p.name)}" data-i="${p.i}" data-idx="${idx}" style="margin:0;">↩️ 보류</button>
        </div>
      </div>`).join("")
    : `<div class="empty-msg">지금 확인할 제출이 없어요 ☕</div>`;

  // 학생별 현황
  const rowsHtml = students.length
    ? students.map((s,si) => {
        const st = normalizeStatuses(s);
        const passedCount = st.filter(x=>x==="passed").length;
        const allDone = passedCount === 9;
        const dots = st.map(x => `<span class="dot ${x==="passed"?"p":x==="pending"?"w":x==="hold"?"h":""}" title="${x}"></span>`).join("");
        return `<div class="student-row clickable" data-student-idx="${si}" data-student-name="${esc(s.name)}">
          <span><b>${esc(s.name)}</b> · ${countBingo(st)}빙고 (${passedCount}/9)${s.reflection && s.reflection.text ? " 📝" : ""}${allDone ? `<span class="complete-badge">완주 🏆</span>` : ""} <span class="chev">▸</span></span>
          <span class="dots">${dots}</span>
        </div>
        <div class="student-detail" id="detail-${si}" style="display:none;"></div>`;
      }).join("")
    : `<div class="empty-msg">아직 접속한 학생이 없어요.</div>`;

  // 소감문 목록
  const reflections = students
    .filter(s => s.reflection && s.reflection.text)
    .map(s => ({ name: s.name, ...s.reflection }))
    .sort((a,b) => b.savedAt - a.savedAt);
  const reflectListHtml = reflections.length
    ? reflections.map(r => `
      <div class="reflect-item">
        <div class="r-name">🙋 ${esc(r.name)}</div>
        <div class="r-text">${esc(r.text)}</div>
        <div class="r-date">${new Date(r.savedAt).toLocaleString("ko-KR")} 제출</div>
      </div>`).join("")
    : `<div class="empty-msg">아직 제출된 소감문이 없어요.</div>`;

  // 과제방 링크 설정
  const linkRows = MISSIONS.map((m,i)=>{
    const v = links[i] || links[String(i)] || "";
    return `
    <div class="link-row">
      <span class="l-name">${i+1}. ${esc(m.length>14 ? m.slice(0,14)+"…" : m)}</span>
      <input type="url" data-link-i="${i}" placeholder="과제방 링크 (https://...)" value="${esc(v)}">
    </div>`;
  }).join("");

  app.innerHTML = `
    <div class="topbar">
      <span class="who">👩‍🏫 선생님 화면</span>
      <div class="actions">
        <button class="mini-btn" id="refreshBtn">🔄 새로고침</button>
        <button class="mini-btn" id="logoutBtn">나가기</button>
      </div>
    </div>
    <div class="section">
      <h3>📮 확인 대기 중인 제출 (${pendingItems.length})</h3>
      ${pendingHtml}
    </div>
    <div class="section">
      <h3>📊 학생별 현황 (${students.length}명)</h3>
      <div style="font-size:11.5px;color:#8AA5BD;margin-bottom:8px;">
        ■ 초록=통과 · 노랑=확인 대기 · 빨강=보류 · 회색=미시작 (왼쪽부터 미션 1~9)<br>
        👆 학생 이름을 누르면 통과한 과제물을 볼 수 있어요. 9개를 모두 완주한 학생은 보고서(PDF)로 저장할 수 있어요.
      </div>
      ${rowsHtml}
    </div>
    <div class="section">
      <h3>📝 학생 소감문 (${reflections.length})</h3>
      ${reflectListHtml}
    </div>
    <div class="section">
      <h3>🔗 과제방 링크 연결</h3>
      <div style="font-size:12px;color:#8AA5BD;margin-bottom:10px;">각 과제방을 만든 뒤 링크를 붙여 넣고 저장하면, 학생 화면의 "과제방 들어가기" 버튼이 열려요.</div>
      ${linkRows}
      <button class="btn btn-navy" id="saveLinksBtn" style="width:100%;margin-top:6px;">링크 저장하기</button>
    </div>`;

  document.getElementById("refreshBtn").onclick = renderTeacher;
  document.getElementById("logoutBtn").onclick = renderLogin;

  // ── 학생별 현황: 이름 클릭 시 통과 과제물 펼치기 ──
  const loadedDetails = {};
  app.querySelectorAll("[data-student-idx]").forEach(row=>{
    row.onclick = async ()=>{
      const si = row.dataset.studentIdx;
      const name = row.dataset.studentName;
      const box = document.getElementById("detail-" + si);
      if(!box) return;
      if(box.style.display === "block"){ box.style.display = "none"; return; }
      box.style.display = "block";
      if(loadedDetails[si]){ return; }   // 이미 불러왔으면 재사용
      box.innerHTML = `<div style="font-size:12.5px;color:#8AA5BD;padding:6px;">통과한 과제물을 불러오는 중...</div>`;
      const student = students.find(s=>s.name===name);
      const st = normalizeStatuses(student);
      const detail = await loadStudentSubmissions(name, st);
      loadedDetails[si] = detail;
      renderStudentDetail(box, name, st, student, detail);
    };
  });

  // 각 제출의 과제방 내용(글/사진) 불러오기
  app.querySelectorAll(".r-content").forEach(async box=>{
    const name = box.dataset.name, i = parseInt(box.dataset.i);
    const missionId = "mission" + (i+1);
    try{
      const postSnap = await db.collection("missions").doc(missionId)
        .collection("posts").doc(name).get();
      if(!postSnap.exists){
        box.innerHTML = `<div style="font-size:12.5px;color:#8AA5BD;background:#F4FAFF;border-radius:10px;padding:9px 12px;">과제방에서 제출한 내용이 없어요. (과제방 없이 제출된 미션)</div>`;
        return;
      }
      const post = postSnap.data();
      let metaLine = "";
      if(post.subject) metaLine += `${esc(post.subjectLabel||"주제")}: <b>${esc(post.subject)}</b>`;
      if(post.place) metaLine += (metaLine?" · ":"") + `${esc(post.placeLabel||"장소")}: ${esc(post.place)}`;
      if(post.submittedAt) metaLine += (metaLine?" · ":"") + new Date(post.submittedAt).toLocaleString("ko-KR");
      box.innerHTML = `
        ${metaLine ? `<div style="font-size:12px;color:#8AA5BD;margin-bottom:6px;">${metaLine}</div>` : ""}
        <div style="font-size:13.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;background:#F4FAFF;border-radius:10px;padding:10px 12px;margin-bottom:8px;">${esc(post.text||"")}</div>
        <div class="p-photos" style="display:flex;gap:6px;flex-wrap:wrap;"><span style="font-size:12px;color:#8AA5BD;">사진 불러오는 중...</span></div>`;
      // 사진 불러오기
      const photoBox = box.querySelector(".p-photos");
      try{
        const phSnap = await db.collection("missions").doc(missionId)
          .collection("posts").doc(name).collection("photos").orderBy("order").get();
        const list = phSnap.docs.map(d=>d.data().data);
        photoBox.innerHTML = list.length
          ? list.map(d=>`<img src="${d}" alt="제출 사진" style="width:88px;height:88px;object-fit:cover;border-radius:10px;border:1.5px solid #D8E8F4;cursor:pointer;">`).join("")
          : `<span style="font-size:12px;color:#8AA5BD;">사진 없음</span>`;
        photoBox.querySelectorAll("img").forEach(img=>{ img.onclick = ()=>openLightbox(img.src); });
      }catch(e){
        photoBox.innerHTML = `<span style="font-size:12px;color:#B33227;">사진 로딩 실패</span>`;
      }
    }catch(e){
      box.innerHTML = `<div style="font-size:12.5px;color:#B33227;">내용을 불러오지 못했어요.</div>`;
    }
  });

  app.querySelectorAll("[data-act]").forEach(btn=>{
    btn.onclick = async () => {
      const name = btn.dataset.name, i = parseInt(btn.dataset.i), act = btn.dataset.act;
      btn.disabled = true;
      const fbInput = app.querySelector(`[data-feedback-idx="${btn.dataset.idx}"]`);
      const feedback = fbInput ? fbInput.value.trim() : "";
      try{
        const snap = await studentRef(name).get();
        const st = normalizeStatuses(snap.exists ? snap.data() : {});
        if(st[i] === "pending"){
          st[i] = act;
          await studentRef(name).set({ statuses: st, updatedAt: Date.now() }, { merge:true });
          // 과제방 게시글의 상태와 선생님 한마디도 함께 갱신 (과제방이 있는 경우)
          try{
            const postRef = db.collection("missions").doc("mission"+(i+1)).collection("posts").doc(name);
            const postSnap = await postRef.get();
            if(postSnap.exists) await postRef.set({ status: act, feedback }, { merge:true });
          }catch(e){}
          toast(act==="passed" ? `${name} 미션 ${i+1} 통과 처리!` : `${name} 미션 ${i+1} 보류 처리`);
        }
      }catch(e){
        toast("처리에 실패했어요. 다시 시도해 주세요.");
      }
      renderTeacher();
    };
  });

  document.getElementById("saveLinksBtn").onclick = async () => {
    const newLinks = {};
    app.querySelectorAll("[data-link-i]").forEach(inp=>{
      const v = inp.value.trim();
      if(v) newLinks[inp.dataset.linkI] = v;
    });
    try{
      await db.collection("config").doc("links").set(newLinks);
      toast("과제방 링크를 저장했어요!");
    }catch(e){
      toast("저장에 실패했어요. 다시 시도해 주세요.");
    }
  };
}

/* ─────────── 학생 통과 과제물 불러오기 ─────────── */
async function loadStudentSubmissions(name, statuses){
  const result = [];
  for(let i=0;i<9;i++){
    if(statuses[i] !== "passed") continue;
    const missionId = "mission" + (i+1);
    try{
      const postSnap = await db.collection("missions").doc(missionId)
        .collection("posts").doc(name).get();
      let post = postSnap.exists ? postSnap.data() : null;
      let photos = [];
      if(post){
        try{
          const phSnap = await db.collection("missions").doc(missionId)
            .collection("posts").doc(name).collection("photos").orderBy("order").get();
          photos = phSnap.docs.map(d=>d.data().data);
        }catch(e){}
      }
      result.push({ index:i, mission:MISSIONS[i], post, photos });
    }catch(e){
      result.push({ index:i, mission:MISSIONS[i], post:null, photos:[], error:true });
    }
  }
  return result;
}

/* ─────────── 학생 상세 렌더 ─────────── */
function submissionInner(item){
  const p = item.post;
  let metaLine = "";
  if(p){
    if(p.subject) metaLine += `${esc(p.subjectLabel||"주제")}: ${esc(p.subject)}`;
    if(p.place) metaLine += (metaLine?" · ":"") + `${esc(p.placeLabel||"정보")}: ${esc(p.place)}`;
  }
  const textHtml = (p && p.text)
    ? `<div class="sd-text">${esc(p.text)}</div>`
    : `<div class="sd-none">글 없음 (사진/인증 과제)</div>`;
  const photoHtml = (item.photos && item.photos.length)
    ? `<div class="sd-photos">${item.photos.map(d=>`<img src="${d}" alt="과제 사진">`).join("")}</div>`
    : "";
  return `
    ${metaLine ? `<div class="sd-meta">${metaLine}</div>` : ""}
    ${textHtml}
    ${photoHtml}`;
}

function renderStudentDetail(box, name, statuses, student, detail){
  const passedCount = statuses.filter(x=>x==="passed").length;
  const allDone = passedCount === 9;

  let html = detail.map(item=>`
    <div class="sd-mission">
      <div class="sd-mhead">미션 ${item.index+1}. ${esc(item.mission)}</div>
      ${submissionInner(item)}
    </div>`).join("");

  if(!detail.length){
    html = `<div class="sd-none" style="padding:6px;">아직 통과한 과제가 없어요.</div>`;
  }

  // 소감문
  if(student && student.reflection && student.reflection.text){
    html += `
    <div class="sd-mission">
      <div class="sd-mhead">📝 방학 소감문</div>
      <div class="sd-text">${esc(student.reflection.text)}</div>
    </div>`;
  }

  if(allDone){
    html += `<button class="pdf-btn" data-pdf-name="${esc(name)}">🏆 완주 보고서 PDF로 저장하기</button>`;
  } else {
    html += `<div class="sd-none" style="padding:8px 0 2px;">아직 9개를 모두 완주하지 않았어요. (통과 ${passedCount}/9)<br>모두 완주하면 보고서(PDF) 저장 버튼이 나타나요.</div>`;
  }

  box.innerHTML = html;
  box.querySelectorAll(".sd-photos img").forEach(img=>{ img.onclick = ()=>openLightbox(img.src); });

  const pdfBtn = box.querySelector("[data-pdf-name]");
  if(pdfBtn){
    pdfBtn.onclick = ()=> exportStudentPdf(name, statuses, student, detail, pdfBtn);
  }
}

/* ─────────── PDF 보고서 출력 ─────────── */
async function exportStudentPdf(name, statuses, student, detail, btn){
  if(typeof html2pdf === "undefined"){ toast("PDF 도구를 불러오지 못했어요. 인터넷 연결을 확인해 주세요."); return; }
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = "보고서를 만드는 중... 잠시만요";

  const today = new Date().toLocaleDateString("ko-KR");
  const missionBlocks = detail.map(item=>{
    const p = item.post;
    let meta = "";
    if(p){
      if(p.subject) meta += `<div style="font-size:12px;color:#555;margin:2px 0;"><b>${esc(p.subjectLabel||"주제")}:</b> ${esc(p.subject)}</div>`;
      if(p.creator) meta += `<div style="font-size:12px;color:#555;margin:2px 0;"><b>제작자:</b> ${esc(p.creator)} · <b>연도:</b> ${esc(p.year||"-")} · <b>유형:</b> ${esc(p.artType||"-")}</div>`;
      else if(p.place) meta += `<div style="font-size:12px;color:#555;margin:2px 0;"><b>${esc(p.placeLabel||"정보")}:</b> ${esc(p.place)}</div>`;
    }
    const text = (p && p.text) ? `<div style="font-size:12.5px;line-height:1.7;white-space:pre-wrap;color:#222;margin-top:4px;">${esc(p.text)}</div>` : `<div style="font-size:12px;color:#888;">(사진/인증 과제)</div>`;
    const photos = (item.photos && item.photos.length)
      ? `<div style="margin-top:6px;">${item.photos.map(d=>`<img src="${d}" style="width:150px;height:150px;object-fit:cover;border-radius:8px;border:1px solid #ccc;margin:3px;display:inline-block;">`).join("")}</div>`
      : "";
    return `
      <div style="page-break-inside:avoid;margin-bottom:16px;padding:12px 14px;border:1px solid #DCE6F0;border-radius:10px;background:#FBFDFF;">
        <div style="font-family:'Jua',sans-serif;font-size:15px;color:#1B4B8F;margin-bottom:6px;">미션 ${item.index+1}. ${esc(item.mission)}</div>
        ${meta}${text}${photos}
      </div>`;
  }).join("");

  const reflectionBlock = (student && student.reflection && student.reflection.text)
    ? `<div style="page-break-inside:avoid;margin-top:8px;padding:14px;border:2px solid #F5B301;border-radius:10px;background:#FFFBF0;">
        <div style="font-family:'Jua',sans-serif;font-size:15px;color:#B37A00;margin-bottom:6px;">📝 방학 미션 빙고 소감문</div>
        <div style="font-size:13px;line-height:1.8;white-space:pre-wrap;color:#222;">${esc(student.reflection.text)}</div>
      </div>`
    : "";

  const wrapper = document.createElement("div");
  wrapper.style.cssText = "width:720px;padding:32px;font-family:'Gowun Dodum',sans-serif;background:#fff;color:#222;";
  wrapper.innerHTML = `
    <div style="text-align:center;border-bottom:3px solid #E8493A;padding-bottom:14px;margin-bottom:20px;">
      <div style="font-family:'Jua',sans-serif;font-size:26px;color:#E8493A;">🏆 여름방학 미션 빙고 완주 보고서</div>
      <div style="font-size:15px;color:#1B4B8F;margin-top:8px;font-family:'Jua',sans-serif;">${esc(name)} 학생 · 9개 미션 전체 완주</div>
      <div style="font-size:12px;color:#888;margin-top:4px;">발급일: ${today}</div>
    </div>
    ${missionBlocks}
    ${reflectionBlock}
    <div style="text-align:center;margin-top:24px;padding-top:14px;border-top:1px dashed #ccc;font-size:12px;color:#999;">
      여름방학 미션 빙고를 모두 완성한 것을 축하합니다! 🎉
    </div>`;

  try{
    await html2pdf().set({
      margin: [10,8,10,8],
      filename: `미션빙고_완주보고서_${name}.pdf`,
      image: { type:"jpeg", quality:0.92 },
      html2canvas: { scale:2, useCORS:true },
      jsPDF: { unit:"mm", format:"a4", orientation:"portrait" },
      pagebreak: { mode:["css","legacy"] }
    }).from(wrapper).save();
    toast(`${name} 완주 보고서를 저장했어요! 🏆`);
  }catch(e){
    toast("PDF 저장에 실패했어요. 다시 시도해 주세요.");
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = original;
}

/* ─────────── 시작 ─────────── */
init();
</script>
</body>
</html>
